name: Build and Deploy

on:
  push:
    branches:
      - master # Change this to your fork's branch name if it's different

permissions:
  contents: write # Required for peaceiris/actions-gh-pages to push to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Updated to match modern build tool requirements
          cache: "npm"

      - name: Install dependencies
        run: npm ci # Faster and more reliable than 'install' for CI environments

      - name: Build project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # Ensures your built files are pushed to the gh-pages branch
